<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boosty Bookmark</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #16161a;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 14px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #1f1f24;
      border: 1px solid #2c2c33;
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }
    h1 { font-size: 19px; margin: 0 0 10px; }
    p { font-size: 14px; line-height: 1.5; color: #b9b9c0; margin: 0 0 14px; }
    .host {
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      color: #ff8a4c;
      background: #16161a;
      border: 1px solid #2c2c33;
      border-radius: 8px;
      padding: 10px 12px;
      margin: 0 0 16px;
      word-break: break-all;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #ff5c12;
      color: #fff;
      transition: background 0.15s ease, opacity 0.15s ease;
    }
    button:hover { background: #ff7733; }
    button:disabled { opacity: 0.55; cursor: default; }
    .status { margin-top: 12px; font-size: 13px; line-height: 1.4; min-height: 18px; }
    .status.ok { color: #4caf7d; }
    .status.err { color: #e06c6c; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <code class="host" id="host">—</code>
    <button id="grant-btn"></button>
    <div class="status" id="status"></div>
  </div>
  <script src="permissions.js"></script>
</body>
</html>
