name: Release

# Релиз публикуется при пуше тега вида v0.9.0.
# Локальный git commit GitHub не видит — публикацию запускает именно тег:
#   git tag v0.9.0 && git push origin v0.9.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # нужно для создания GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Защита от рассинхрона: версия в manifest.json должна совпадать с тегом.
      - name: Проверка соответствия тега и версии manifest
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          echo "Тег: $TAG | manifest.json: $MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Тег v$TAG не совпадает с версией в manifest.json ($MANIFEST_VERSION)."
            exit 1
          fi

      - name: Unit-тесты
        run: npm run test:unit

      - name: Сборка релизных архивов (Chrome + Firefox)
        run: |
          npm run build
          npm run build:firefox

      - name: Публикация GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            boosty-bookmark-v*-release.zip
            boosty-bookmark-v*-firefox-release.zip
